[phases.setup]
# (Optionnel) Les limites dans conf.d peuvent ne pas être lues par le CLI
cmds = [
    'mkdir -p /usr/local/etc/php/conf.d',
    'echo "upload_max_filesize=40M" > /usr/local/etc/php/conf.d/laravel-limits.ini',
    'echo "post_max_size=45M" >> /usr/local/etc/php/conf.d/laravel-limits.ini'
]

[start]
# On force les limites directement dans la commande PHP
cmd = "php -d upload_max_filesize=40M -d post_max_size=45M artisan serve --host=0.0.0.0 --port=80"




