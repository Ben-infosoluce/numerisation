services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    ports:
      - "80:80"
    volumes:
      - .env:/var/www/html/.env
      - storage-data:/var/www/html/storage
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .env:/var/www/html/.env
      - storage-data:/var/www/html/storage
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .env:/var/www/html/.env
      - storage-data:/var/www/html/storage
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  storage-data:
